name: wedding_invite
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.6+10

environment:
  sdk: ^3.9.2

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  animations: ^2.1.1
  cached_network_image: ^3.4.1
  cloud_firestore: ^6.1.0
  cloud_functions: ^6.0.4
  country_picker: ^2.0.27
  cupertino_icons: ^1.0.8
  dio: ^5.9.1
  file_picker: ^10.3.10
  firebase_auth: ^6.1.2
  firebase_core: ^4.2.1
  firebase_messaging: ^16.1.1
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  flutter_contacts: ^1.1.9+2
  flutter_launcher_icons: ^0.14.4
  flutter_local_notifications: ^20.0.0
  flutter_riverpod: ^3.0.3
  flutter_screenutil: ^5.9.3
  flutter_staggered_grid_view: ^0.7.0
  flutter_svg: ^2.2.3
  fluttertoast: ^9.0.0
  gal: ^2.3.2
  go_router: ^17.0.0
  image_picker: ^1.2.1
  intl: ^0.20.2
  loading_indicator: ^3.1.1
  lottie: ^3.3.2
  palette_generator: ^0.3.3+7
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  pinput: ^5.0.2
  share_plus: ^12.0.1
  shared_preferences: ^2.5.4
  upgrader: ^12.5.0
  url_launcher: ^6.3.2
  video_player: ^2.10.1
  video_thumbnail: ^0.5.6
  visibility_detector: ^0.4.0+2

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path_android: "assets/images/playstore.png"
  image_path_ios: "assets/images/appstore.png"
  # image_path: "assets/icons/appstore.png"

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec
# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true
  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/
    - assets/images/mehendi/women/
    - assets/images/mehendi/men/
    - assets/images/mehendi/kid/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images
  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package
  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  fonts:
    # Inter (UI / Buttons / Body)
    - family: Inter
      fonts:
        - asset: assets/fonts/inter/Inter-Regular.otf
          weight: 400
        - asset: assets/fonts/inter/Inter-Medium.otf
          weight: 500
        - asset: assets/fonts/inter/Inter-SemiBold.otf
          weight: 600
        - asset: assets/fonts/inter/Inter-Bold.otf
          weight: 700

    # Montage (Decorative / Names)
    - family: Montage
      fonts:
        - asset: assets/fonts/montage/Montage.ttf
          # weight: 400

    # SF Pro Display (System-like)
    - family: SFPro
      fonts:
        - asset: assets/fonts/SFPro/SFPRODISPLAYREGULAR.OTF
          weight: 400
        - asset: assets/fonts/SFPro/SFPRODISPLAYMEDIUM.OTF
          weight: 500
        - asset: assets/fonts/SFPro/SFPRODISPLAYBOLD.OTF
          weight: 700
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
